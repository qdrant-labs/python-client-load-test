# Qdrant Recall Sweep — Structured Configuration
#
# Run with:
#   uv run main.py \
#     --qdrant-url $QDRANT_URL \
#     --qdrant-api-key $QDRANT_API_KEY \
#     --collection-name my_collection \
#     --parquet-file queries.parquet \
#     --num-queries 1000 \
#     --concurrency 100 \
#     --limit 10 \
#     --output sweep_report.html \
#     --experiment-file experiment_example.yaml
#
# To resume an interrupted sweep:
#   uv run main.py ... --output sweep_report.html --resume
#
# ──────────────────────────────────────────────────────────────────────────────
# STRUCTURE
# ──────────────────────────────────────────────────────────────────────────────
# groups:
#   Top-level unit. Each group specifies:
#     collection_config  — quantization type and settings (applied at the
#                          collection level before index builds)
#     index_configs      — HNSW graph build parameters (m, ef_construct).
#                          One rebuild per entry.
#     search_params      — Search-time parameters swept within each index build
#                          (hnsw_ef, oversampling, rescore).
#
#   The tool generates one ExperimentRun per (index_config × search_param) pair.
#   Run names are auto-generated: {group}/{index}/{search}
#   e.g. "scalar/m32-efc256/ef128-rescore-os2x"
#
#   The first search_param under each index_config triggers apply_config=True
#   (collection rebuild). Subsequent search_params reuse the rebuilt index.
#   Set apply_config: false on a group to skip all rebuilds in that group.
#
# runs:  (optional)
#   Flat list of one-off ExperimentRuns (backward-compatible, appended after groups).
#   Use for cross-collection tests, hybrid/sparse modes, filtered runs, etc.
#
# ──────────────────────────────────────────────────────────────────────────────
# QUANTIZATION TYPES (collection_config.quantization)
#   none    — clear existing quantization
#   scalar  — INT8 scalar quantization
#   binary  — binary quantization; bits controlled by encoding:
#               (omit)              → 1-bit (default)
#               one_and_half_bits   → 1.5-bit
#               two_bits            → 2-bit
#             query_encoding (asymmetric): scalar8bits | scalar4bits
#   turbo   — TurboQuant; bits: bits1 | bits1_5 | bits2 | bits4
#
# stopping_metric: p01 | p05 | p10 | p50 | mean
# stopping_threshold: 0.0 – 1.0  (omit or null to run all runs)
# ──────────────────────────────────────────────────────────────────────────────

stopping_metric: p10
stopping_threshold: 0.99
# limit overrides --limit from the CLI for all runs in this sweep.
# Must be >= the largest hnsw_ef tested: Qdrant uses max(limit, hnsw_ef)
# for the priority queue, so hnsw_ef < limit is effectively a no-op.
limit: 1000

groups:

  # ── Scalar INT8 ─────────────────────────────────────────────────────────────
  - name: scalar
    collection_config:
      quantization: scalar
      always_ram: true
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
      - hnsw_ef: 1536
      - hnsw_ef: 2048
      - hnsw_ef: 3072

  # ── Scalar INT8 + rescore ────────────────────────────────────────────────────
  - name: scalar-rescore
    collection_config:
      quantization: scalar
      always_ram: true
    index_configs:
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 2.0

  # ── Binary 1-bit (default encoding, symmetric query) ────────────────────────
  - name: binary-1bit
    collection_config:
      quantization: binary
      always_ram: true
      # encoding omitted → 1-bit
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── Binary 1-bit + asymmetric scalar8bits query ──────────────────────────────
  - name: binary-1bit-asym-scalar8
    collection_config:
      quantization: binary
      always_ram: true
      query_encoding: scalar8bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 1536
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 2048
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 3072
        rescore: true
        oversampling: 2.0

  # ── Binary 1-bit + asymmetric scalar4bits query ──────────────────────────────
  - name: binary-1bit-asym-scalar4
    collection_config:
      quantization: binary
      always_ram: true
      query_encoding: scalar4bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── Binary 1.5-bit ───────────────────────────────────────────────────────────
  - name: binary-1.5bit
    collection_config:
      quantization: binary
      encoding: one_and_half_bits
      always_ram: true
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── Binary 1.5-bit + asymmetric scalar8bits query ────────────────────────────
  - name: binary-1.5bit-asym-scalar8
    collection_config:
      quantization: binary
      encoding: one_and_half_bits
      always_ram: true
      query_encoding: scalar8bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 1536
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 2048
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 3072
        rescore: true
        oversampling: 2.0

  # ── Binary 1.5-bit + asymmetric scalar4bits query ────────────────────────────
  - name: binary-1.5bit-asym-scalar4
    collection_config:
      quantization: binary
      encoding: one_and_half_bits
      always_ram: true
      query_encoding: scalar4bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── Binary 2-bit ─────────────────────────────────────────────────────────────
  - name: binary-2bit
    collection_config:
      quantization: binary
      encoding: two_bits
      always_ram: true
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── Binary 2-bit + asymmetric scalar8bits query ──────────────────────────────
  - name: binary-2bit-asym-scalar8
    collection_config:
      quantization: binary
      encoding: two_bits
      always_ram: true
      query_encoding: scalar8bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 1536
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 2048
        rescore: true
        oversampling: 1.5
      - hnsw_ef: 3072
        rescore: true
        oversampling: 2.0

  # ── Binary 2-bit + asymmetric scalar4bits query ──────────────────────────────
  - name: binary-2bit-asym-scalar4
    collection_config:
      quantization: binary
      encoding: two_bits
      always_ram: true
      query_encoding: scalar4bits
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── TurboQuant bits4 (lowest compression, highest recall) ───────────────────
  - name: turbo-bits4
    collection_config:
      quantization: turbo
      bits: bits4
      always_ram: true
    index_configs:
      - m: 16
        ef_construct: 128
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 2.0

  # ── TurboQuant bits2 ─────────────────────────────────────────────────────────
  - name: turbo-bits2
    collection_config:
      quantization: turbo
      bits: bits2
      always_ram: true
    index_configs:
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── TurboQuant bits1_5 ───────────────────────────────────────────────────────
  - name: turbo-bits1_5
    collection_config:
      quantization: turbo
      bits: bits1_5
      always_ram: true
    index_configs:
      - m: 32
        ef_construct: 256
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0

  # ── TurboQuant bits1 (max compression) ──────────────────────────────────────
  - name: turbo-bits1
    collection_config:
      quantization: turbo
      bits: bits1
      always_ram: true
    index_configs:
      - m: 64
        ef_construct: 512
      - m: 128
        ef_construct: 1024
    search_params:
      - hnsw_ef: 1024
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 1536
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 2048
        rescore: true
        oversampling: 2.0
      - hnsw_ef: 3072
        rescore: true
        oversampling: 4.0


# ── One-off / custom runs (flat format) ─────────────────────────────────────
# Appended after all group-generated runs.
# Useful for: cross-collection tests, hybrid/sparse, payload filters, custom naming.
#
# runs:
#
#   # Cross-collection: benchmark a separately-indexed collection (different m)
#   - name: "external-m32-collection"
#     collection_name: my_collection_m32
#     apply_config: false
#     hnsw_ef: 128
#     rescore: true
#     oversampling: 2.0
#
#   # Payload filter: recall is computed against a filtered brute-force baseline
#   - name: "scalar/m32-efc256/ef128-filtered-cat-a"
#     apply_config: false
#     hnsw_ef: 128
#     query_filter:
#       must:
#         - key: category
#           match:
#             value: "A"
#
#   # Hybrid: RRF fusion of dense + sparse (requires --sparse-parquet-file)
#   - name: "hybrid-rrf/m32-efc256/ef128-rescore-os2x"
#     apply_config: false
#     query_mode: hybrid
#     sparse_vector_name: sparse_vectors
#     hnsw_ef: 128
#     rescore: true
#     oversampling: 2.0
#
#   # Per-run warmup override
#   - name: "scalar/m32-efc256/ef128-warmup500"
#     apply_config: false
#     hnsw_ef: 128
#     warmup_queries: 500
